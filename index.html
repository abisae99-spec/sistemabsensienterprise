<!DOCTYPE html>
<html lang="id" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Sistem Absensi Enterprise</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
    }
  </script>

  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/react-is@18.2.0/umd/react-is.production.min.js"></script>
  <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>

  <!-- PATCH UMD BROWSER -->
  <script>
    window.react = window.React;
    window['react-dom'] = window.ReactDOM;
    window['react-is'] = window.ReactIs;
    window['prop-types'] = window.PropTypes;
  </script>

  <!-- Library Grafik & Ikon -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.1.9/Recharts.js"></script>
  <script src="https://unpkg.com/lucide-react@0.292.0/dist/umd/lucide-react.min.js"></script>

  <!-- Babel untuk JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- jsQR untuk fallback QR scanning -->
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>

  <style>
    body { margin: 0; padding: 0; background-color: #E0F2F1; }
    html.dark body { background-color: #0A1128; }
    
    .bg-cubes-lamp { background-image: url('https://www.transparenttextures.com/patterns/cubes.png'); background-repeat: repeat; filter: invert(1) brightness(2); }
    .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(0, 112, 186, 0.4); border-radius: 10px; }
    .mask-edges { -webkit-mask-image: linear-gradient(to right, transparent, black 5%, black 95%, transparent); mask-image: linear-gradient(to right, transparent, black 5%, black 95%, transparent); }
    .animate-fade-in-up { animation: fadeInUp 0.5s ease-out forwards; }
    .animate-bg-scroll { animation: bgScroll 60s linear infinite; }
    @keyframes bgScroll { from { background-position: 0 0; } to { background-position: 100px 100px; } }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes scan { 0% { top: 0; } 50% { top: calc(100% - 4px); } 100% { top: 0; } }

    /* Print Styles */
    @media print { body * { visibility: hidden; } .fixed.inset-0.z-\[100\] * { visibility: visible; } .fixed.inset-0.z-\[100\] { position: absolute; left: 0; top: 0; } #slip-gaji-print { visibility: visible; position: absolute; left: 0; top: 0; width: 100%; height: 100%; box-shadow: none; border: none; } }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;
    
    // Fallback Safeguards untuk pustaka grafik (mencegah error undefined)
    const Recharts = window.Recharts || {};
    const FallbackComponent = ({ children }) => <div className="fallback-chart">{children}</div>;
    const { 
      AreaChart = FallbackComponent, Area = FallbackComponent, PieChart = FallbackComponent, Pie = FallbackComponent, 
      Cell = FallbackComponent, XAxis = FallbackComponent, YAxis = FallbackComponent, CartesianGrid = FallbackComponent, 
      Tooltip: RechartsTooltip = FallbackComponent, Legend = FallbackComponent, ResponsiveContainer = FallbackComponent 
    } = Recharts;

    const Lucide = window.lucideReact || {};
    const FallbackIcon = () => <span className="fallback-icon"></span>;
    const { 
      MapPin = FallbackIcon, Camera = FallbackIcon, ScanLine = FallbackIcon, Clock = FallbackIcon, Calendar = FallbackIcon, 
      CheckCircle = FallbackIcon, XCircle = FallbackIcon, AlertTriangle = FallbackIcon, Home = FallbackIcon, 
      FileText = FallbackIcon, BarChart2 = FallbackIcon, Settings = FallbackIcon, LogOut = FallbackIcon, Moon = FallbackIcon, 
      Sun = FallbackIcon, User = FallbackIcon, Briefcase = FallbackIcon, Plus = FallbackIcon, Edit = FallbackIcon, 
      Trash2 = FallbackIcon, Download = FallbackIcon, Search = FallbackIcon, CheckSquare = FallbackIcon, Users = FallbackIcon, 
      RefreshCw = FallbackIcon, Shield = FallbackIcon, Check = FallbackIcon, Image: ImageIcon = FallbackIcon, 
      Save = FallbackIcon, Upload = FallbackIcon, Printer = FallbackIcon, ToggleLeft = FallbackIcon, ToggleRight = FallbackIcon, 
      FileDown = FallbackIcon, ImagePlus = FallbackIcon, Loader2 = FallbackIcon 
    } = Lucide;

    // KONFIGURASI DATABASE
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxBoE9OK-bH_W8139VVTORk3-Ds4vK76odozzJZ6ZhdUq_L2UQQRKoATnFcpdPv6VWp/exec";
    const OFFICE_COORD = { lat: -6.1522193, lng: 106.789063 };
    const RADIUS_TOLERANCE_METERS = 100;
    const COLORS = { hadir: '#00F0FF', telat: '#FFB800', absen: '#FF003C', purple: '#B026FF', orange: '#FF5E00', lightPrimary: '#0070BA' };

    // --- HELPER FUNCTIONS ---
    const calculateDistance = (lat1, lon1, lat2, lon2) => {
      const R = 6371e3; const rad = Math.PI / 180;
      const a = Math.sin((lat2 - lat1) * rad / 2) ** 2 + Math.cos(lat1 * rad) * Math.cos(lat2 * rad) * Math.sin((lon2 - lon1) * rad / 2) ** 2;
      return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a)));
    };
    const formatTime = (date) => {
      const hh = String(date.getHours()).padStart(2, '0');
      const mm = String(date.getMinutes()).padStart(2, '0');
      const ss = String(date.getSeconds()).padStart(2, '0');
      return `${hh}:${mm}:${ss}`;
    };
    const formatDate = (date) => {
      const d = typeof date === 'string' ? new Date(date) : date;
      return `${String(d.getDate()).padStart(2, '0')}/${String(d.getMonth() + 1).padStart(2, '0')}/${d.getFullYear()}`;
    };
    const formatRupiah = (number) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', maximumFractionDigits: 0 }).format(number || 0);
    
    const formatIndoDate = (dateStr) => { 
        if (!dateStr || dateStr === '-') return '-'; let str = String(dateStr); 
        if (str.includes('/')) { const p = str.split('/'); return p[0].length === 4 ? `${p[2]}/${p[1]}/${p[0]}` : str; }
        if (str.includes('T')) str = str.split('T')[0]; if (str.includes(' ')) str = str.split(' ')[0];
        const p = str.split('-'); return p.length === 3 ? `${p[2].padStart(2,'0')}/${p[1].padStart(2,'0')}/${p[0]}` : str; 
    };
    const formatSheetTime = (val) => { if (!val) return ''; let strVal = String(val); if (strVal.includes('T')) { const timePart = strVal.split('T')[1]; if (timePart) return timePart.substring(0, 5); } return strVal; };

    const getAttendanceStatus = (time, type, shiftStr = '08:00 - 17:00') => {
      const totalMins = time.getHours() * 60 + time.getMinutes();
      const [sIn, sOut] = shiftStr.split('-').map(t => t.trim());
      const toMins = (t) => { const [h, m] = t.split(':').map(Number); return (h || 0) * 60 + (m || 0); };
      
      if (type === 'IN') {
        const sInM = toMins(sIn);
        const diff = totalMins - sInM;
        if (diff <= 0) return { status: 'Sangat Hadir', color: 'text-emerald-600 dark:text-emerald-400' };
        if (diff > 0 && diff <= 120) return { status: 'Telat', color: 'text-amber-500 dark:text-amber-400' };
        return { status: 'Sangat Telat', color: 'text-rose-600 dark:text-rose-500' };
      } else {
        const sOutM = toMins(sOut);
        const diffOut = sOutM - totalMins;
        if (diffOut > 0 && diffOut <= 300) return { status: 'Pulang Awal', color: 'text-amber-500 dark:text-amber-400' }; // Maksimal 5 Jam (300 Menit)
        if (diffOut > 300) return { status: 'Absen', color: 'text-rose-600 dark:text-rose-500' }; // Lebih awal dari 5 Jam dianggap Absen/Tidak Valid
        if (totalMins <= sOutM + 90) return { status: 'Normal', color: 'text-[#0070BA] dark:text-cyan-400' };
        return { status: 'Lembur', color: 'text-purple-600 dark:text-fuchsia-400' };
      }
    };

    const cleanTimeStr = (t) => {
      if (!t || t === '-' || String(t).trim() === '') return '-';
      
      if (typeof t === 'string' && t.includes('T') && t.includes('Z')) {
          const d = new Date(t);
          if (!isNaN(d.getTime())) {
              const hh = String(d.getHours()).padStart(2, '0');
              const mm = String(d.getMinutes()).padStart(2, '0');
              const ss = String(d.getSeconds()).padStart(2, '0');
              return `${hh}:${mm}:${ss}`;
          }
      }

      let str = String(t).trim();
      if (str.includes('T')) { const timePart = str.split('T')[1]; if(timePart) str = timePart; }
      str = str.replace(/\./g, ':');
      const parts = str.split(':');
      if (parts.length >= 2) { 
          const hh = parts[0].replace(/\D/g, '').slice(-2).padStart(2, '0'); 
          const mm = parts[1].replace(/\D/g, '').slice(0, 2).padStart(2, '0'); 
          const ss = parts.length >= 3 ? parts[2].replace(/\D/g, '').slice(0, 2).padStart(2, '0') : '00';
          return `${hh}:${mm}:${ss}`; 
      }
      return str;
    };

    const toHHMM = (m) => m <= 0 ? '-' : `${String(Math.floor(m/60)).padStart(2, '0')}:${String(m%60).padStart(2, '0')}`;

    const calculateTimes = (shift, checkIn, checkOut) => {
      const cin = cleanTimeStr(checkIn); const cout = cleanTimeStr(checkOut);
      const [sIn, sOut] = (shift || '08:00 - 17:00').split('-').map(t => t.trim()); 
      const toMins = (t) => { const [h, m] = t.split(':').map(Number); return (h || 0) * 60 + (m || 0); };
      const sInM = toMins(sIn); const sOutM = toMins(sOut); 
      
      let telatM = 0; let telatStr = '-';
      if (cin && cin !== '-') {
          const aInM = toMins(cin);
          telatM = aInM > sInM ? aInM - sInM : 0;
          telatStr = telatM > 0 ? toHHMM(telatM) : '-';
      }

      let awalM = 0; let lemburM = 0; let kerjaM = 0;
      let awalStr = '-'; let lemburStr = '-'; let kerjaStr = '-';

      if (cout && cout !== '-') {
          const aOutM = toMins(cout);
          awalM = aOutM < sOutM ? sOutM - aOutM : 0;
          lemburM = aOutM > sOutM ? aOutM - sOutM : 0;
          awalStr = awalM > 0 ? toHHMM(awalM) : '-';
          lemburStr = lemburM > 0 ? toHHMM(lemburM) : '-';
          
          if (cin && cin !== '-') {
              const aInM = toMins(cin);
              kerjaM = aOutM - aInM;
              if (kerjaM < 0) kerjaM = 0;
              kerjaStr = kerjaM > 0 ? toHHMM(kerjaM) : '-';
          }
      }

      return { kerja: kerjaStr, telat: telatStr, awal: awalStr, lembur: lemburStr, telatMins: telatM, lemburMins: lemburM };
    };

    const getDisplayKeterangan = (row, globalRequests) => {
        let ket = row.note || ''; 
        const relatedReq = globalRequests?.find(req => req.id === row.id && new Date(req.tglMulai) <= new Date(row.date) && new Date(req.tglSelesai) >= new Date(row.date));
        
        if(relatedReq) { 
            if (relatedReq.status === 'Approved') {
                ket = relatedReq.jenis.toLowerCase().includes('lembur') ? 'Lembur Disetujui' : `${relatedReq.jenis} Disetujui`;
            } else {
                ket = `${relatedReq.jenis} Belum Disetujui`;
            }
        } else if(row.status === 'HADIR' || row.status === 'TELAT') { 
            ket = ''; 
        } else if(row.status === 'ABSEN' && (!row.note || row.note === '-')) { 
            ket = 'Alfa / Tanpa Keterangan'; 
        } else if(row.foto || (row.note && row.note.toLowerCase().includes('selfie')) || (row.keterangan && row.keterangan.toLowerCase().includes('selfie'))) {
            ket = 'Dinas Luar';
        } else if(row.status === 'SAKIT') {
            ket = 'Sakit';
        }
        return ket;
    };

    const sendDataToSheet = async (data) => {
      try {
        const response = await fetch(GAS_URL, { method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body: JSON.stringify(data), redirect: 'follow' });
        return await response.json();
      } catch (error) {
        if (data.action === 'login') {
          let role = 'user'; let pw = data.password; let user = data.username.toLowerCase();
          if(user === 'admin' && pw === 'iaf2026') role = 'admin'; else if(user === 'top' && pw === 'iaf2026') role = 'top'; else if(user === 'manager' && pw === 'iaf2026') role = 'manager'; else if(user === 'spv' && pw === user) role = 'supervisor'; else if(user === pw) role = 'user'; else throw new Error("Kredensial tidak sesuai master data!");
          return { status: 'success', user: { id: data.username.toUpperCase(), name: data.username.toUpperCase(), dept: 'Departemen Terkait', role: role } };
        }
        return { status: 'success', message: 'Tersimpan (Offline Mode)' };
      }
    };

    // ===== APLIKASI DIMULAI DARI SINI - COPY DARI index.txt YANG SUDAH TERPERBAIKI =====

    const GlassCard = ({ children, className = '', glow = false }) => (
      <div className={`relative rounded-[2rem] transition-all duration-500 bg-white/50 dark:bg-[#0A1128]/80 backdrop-blur-2xl border border-[#0070BA]/30 dark:border-[#00F0FF]/30 shadow-[0_0_15px_rgba(0,112,186,0.1)] dark:shadow-[0_0_15px_rgba(0,240,255,0.15)] ${glow ? 'shadow-[0_0_20px_rgba(0,112,186,0.2)] dark:shadow-[0_0_30px_rgba(0,240,255,0.25)]' : ''} ${className}`}>
        <div className="absolute inset-0 bg-gradient-to-br from-white/30 via-transparent to-transparent opacity-50 dark:opacity-10 pointer-events-none rounded-[2rem]" />
        <div className="relative z-10">{children}</div>
      </div>
    );

    const Button = ({ children, onClick, variant = 'primary', className = '', icon: Icon, disabled = false, type = "button" }) => {
      const variants = {
        primary: `bg-gradient-to-r from-[#0070BA] to-[#004080] dark:from-[#00F0FF] dark:to-[#0057FF] text-white border border-[#0070BA]/50 dark:border-[#00F0FF]/50`,
        secondary: `bg-gradient-to-r from-[#8E24AA] to-[#D81B60] dark:from-[#B026FF] dark:to-[#FF003C] text-white border border-[#8E24AA]/50`,
        outline: `bg-white/40 dark:bg-[#0A1128]/50 text-[#0070BA] dark:text-[#00F0FF] border border-[#0070BA]/50 hover:bg-[#0070BA]/10`,
      };
      return (
        <button type={type} onClick={onClick} disabled={disabled} className={`group relative flex items-center justify-center gap-3 px-8 py-3.5 md:py-4 rounded-2xl transition-all duration-300 active:scale-95 disabled:opacity-50 overflow-hidden ${variants[variant]} ${className}`}>
          {Icon && <Icon size={18} className="relative z-10" />}
          <span className="relative z-10 uppercase text-xs md:text-sm font-black tracking-widest">{children}</span>
        </button>
      );
    };

    const InputGroup = ({ label, type = "text", value, onChange, placeholder, options = [], disabled = false }) => (
      <div className="space-y-1.5 md:space-y-2 w-full">
        <label className="block text-[9px] md:text-[10px] font-bold text-[#0070BA] dark:text-[#00F0FF] uppercase tracking-widest">{label}</label>
        {type === 'select' ? (
          <select value={value} onChange={onChange} disabled={disabled} className="w-full p-3 md:p-3.5 bg-white/50 dark:bg-[#0A1128]/80 border border-[#0070BA]/20 rounded-xl outline-none text-[#134E4A] dark:text-white text-[10px] md:text-xs font-bold disabled:opacity-50">
            {options.map((opt, i) => <option key={i} value={opt}>{opt}</option>)}
          </select>
        ) : (
          <input type={type} value={value} onChange={onChange} placeholder={placeholder} disabled={disabled} className="w-full p-3 md:p-3.5 bg-white/50 dark:bg-[#0A1128]/80 border border-[#0070BA]/20 rounded-xl outline-none text-[#134E4A] dark:text-white text-[10px] md:text-xs font-mono disabled:opacity-50" />
        )}
      </div>
    );

    function App() {
      const [user, setUser] = useState(null); const [role, setRole] = useState(null);
      const [isDarkMode, setIsDarkMode] = useState(true); const [currentScreen, setCurrentScreen] = useState('login'); 
      const [activeSettingTab, setActiveSettingTab] = useState('approve'); const [activeReportTab, setActiveReportTab] = useState('absensi');
      const [isDataLoaded, setIsDataLoaded] = useState(false);
      const [globalPreviewPhoto, setGlobalPreviewPhoto] = useState(null);

      const [uiSettings, setUiSettings] = useState({ logo: null, background: null, companyName: 'PT. Samudra Asia Engineering', hrdName: 'Bpk. Andi Setiawan', hrdTitle: 'Head of HR & GA' });
      const [payrollLabels, setPayrollLabels] = useState({ gapok: 'Gaji Pokok', tMakan: 'Tunj. Uang Makan', tJabatan: 'Tunj. Jabatan', tTransport: 'Tunj. Transportasi', tThr: 'Tunj. THR', tKes: 'Tunj. Kesehatan', tLain: 'Tunj. Lain-lain', insentif: 'Insentif', pAsuransi: 'Pot. Asuransi', pBpjsKs: 'Pot. BPJS KS', pBpjstk: 'Pot. BPJSTK', pPinjam: 'Pot. Pinjaman', pAbsen: 'Pot. Absen', pLain: 'Pot. Lainnya' });
      const [globalEmployees, setGlobalEmployees] = useState([
        { id: 'EMP01', nama: 'Budi Karyawan', jk: 'Laki-laki', phone: '0812345678', tglGabung: '2022-01-10', tmpLahir: 'Jakarta', tglLahir: '1990-05-15', ktp: '317000000000001', alamat: 'Jl. Sudirman No 1', pendidikan: 'S1', role: 'user', dept: 'IT', jabatan: 'Staff', atasan: 'Manager IT', sisaCuti: 10, gapok: 6000000, tMakan: 50000, tJabatan: 0, tTransport: 300000, tThr: 6000000, tKes: 200000, tLain: 0, insentif: 0, pAsuransi: 100000, pBpjsKs: 60000, pBpjstk: 120000, pPinjam: 0, pAbsen: 0, pLain: 0 },
        { id: 'ADMIN', nama: 'Administrator Sistem', jk: 'Laki-laki', phone: '0800000000', tglGabung: '2019-01-01', tmpLahir: 'Jakarta', tglLahir: '1990-01-01', ktp: '317000000000000', alamat: 'Kantor Pusat', pendidikan: 'S1', role: 'admin', dept: 'IT', jabatan: 'Admin', atasan: '-', sisaCuti: 12, gapok: 10000000, tMakan: 100000, tJabatan: 1000000, tTransport: 500000, tThr: 10000000, tKes: 300000, tLain: 0, insentif: 0, pAsuransi: 0, pBpjsKs: 0, pBpjstk: 0, pPinjam: 0, pAbsen: 0, pLain: 0 }
      ]);
      const [globalAttendance, setGlobalAttendance] = useState([]);
      const [globalRequests, setGlobalRequests] = useState([]);

      useEffect(() => {
        const fetchInitialData = async () => {
          try {
            const res = await fetch(GAS_URL); const result = await res.json();
            if (result.status === 'success') {
              const d = result.data;
              if (d.karyawan !== undefined) setGlobalEmployees(d.karyawan);
              if (d.pengajuan !== undefined) setGlobalRequests(d.pengajuan);
              if (d.absen !== undefined) setGlobalAttendance(d.absen);
              if (d.setting && Object.keys(d.setting).length > 0) {
                if (d.setting.uiSettings) setUiSettings(d.setting.uiSettings);
                if (d.setting.payrollLabels) setPayrollLabels(d.setting.payrollLabels);
              }
            }
          } catch (err) {} finally { setIsDataLoaded(true); }
        };
        fetchInitialData();
      }, []);

      const handleLogin = async (credentials) => {
        let u = credentials.username.toUpperCase(); let p = credentials.password; let authRole = null; let authName = "Pengguna";
        const emp = globalEmployees.find(e => e.id && String(e.id).toUpperCase() === u);
        if (u === 'ADMIN' && p === 'iaf2026') { authRole = 'admin'; authName = 'Administrator'; } else if (u === 'TOP' && p === 'iaf2026') { authRole = 'top'; authName = 'Pimpinan Perusahaan'; } else if (emp && (p === 'iaf2026' || p === u.toLowerCase())) { authRole = emp.role; authName = emp.nama; } else { throw new Error("Kredensial tidak sesuai atau Karyawan tidak ditemukan!"); }
        setUser({ id: u, name: authName, role: authRole, dept: emp?.dept, jabatan: emp?.jabatan, sisaCuti: emp?.sisaCuti }); setRole(authRole); setCurrentScreen('dashboard');
      };
      const handleLogout = () => { setUser(null); setRole(null); setCurrentScreen('login'); };

      useEffect(() => { document.documentElement.classList.toggle('dark', isDarkMode); }, [isDarkMode]);

      return (
        <div className="min-h-screen font-sans text-[#134E4A] dark:text-[#E2E8F0] bg-[#E0F2F1] dark:bg-[#0A1128] transition-colors duration-500 overflow-x-hidden">
          {currentScreen === 'login' ? <LoginScreen onLogin={handleLogin} uiSettings={uiSettings} isDataLoaded={isDataLoaded} /> : (
            <div>
              <h1 className="text-center text-2xl font-bold p-4 mt-20">Sistem Absensi Enterprise - Dashboard</h1>
              <div className="text-center p-8">
                <p className="mb-4">Selamat datang, {user?.name}!</p>
                <button onClick={handleLogout} className="px-6 py-2 bg-rose-500 text-white rounded-lg font-bold">Logout</button>
              </div>
            </div>
          )}
        </div>
      );
    }

    function LoginScreen({ onLogin, uiSettings, isDataLoaded }) {
      const [username, setUsername] = useState(''); const [password, setPassword] = useState(''); const [error, setError] = useState(''); const [isLoading, setIsLoading] = useState(false); const [isSplashPhase, setIsSplashPhase] = useState(true);

      useEffect(() => { 
        if (isDataLoaded) { const timer = setTimeout(() => setIsSplashPhase(false), 800); return () => clearTimeout(timer); } 
        else setIsSplashPhase(true);
      }, [isDataLoaded]);

      const submitLogin = async (e) => {
        e.preventDefault(); setIsLoading(true); setError('');
        if (!username || !password) { setError('Lengkapi ID Karyawan dan Kata Sandi.'); setIsLoading(false); return; }
        try { await onLogin({ username, password }); } catch (err) { setError(err.message); } finally { setIsLoading(false); }
      };

      return (
        <div className="flex flex-col items-center justify-center min-h-screen p-4 relative">
          <div className={`absolute inset-0 z-50 flex flex-col items-center justify-center transition-all duration-1000 ${isSplashPhase ? 'opacity-100' : 'opacity-0 pointer-events-none'}`}>
            <h1 className="text-3xl font-black text-[#0070BA] dark:text-[#00F0FF] mb-4">SISTEM ABSENSI</h1>
            <p className="text-lg text-gray-500">Enterprise</p>
          </div>

          <div className={`relative z-20 flex flex-col items-center w-full max-w-md transition-all duration-1000 ${!isSplashPhase ? 'opacity-100' : 'opacity-0 pointer-events-none'}`}>
            <div className="mb-8">
              <h1 className="text-2xl font-black text-[#0070BA] dark:text-[#00F0FF] mb-2">SISTEM ABSENSI</h1>
              <h2 className="text-gray-500">Enterprise</h2>
            </div>

            <GlassCard className="p-8 w-full">
              <form onSubmit={submitLogin} className="space-y-5">
                <InputGroup label="ID Karyawan" type="text" value={username} onChange={(e) => setUsername(e.target.value)} placeholder="Masukkan ID..." />
                <InputGroup label="Password" type="password" value={password} onChange={(e) => setPassword(e.target.value)} placeholder="Masukkan Password..." />
                
                {error && <div className="p-4 bg-rose-100 dark:bg-rose-900/30 border border-rose-500 rounded-lg text-rose-600 dark:text-rose-300 text-xs font-bold">{error}</div>}
                
                <Button type="submit" disabled={isLoading} className="w-full">{isLoading ? 'MEMPROSES...' : 'MASUK'}</Button>
              </form>
            </GlassCard>
          </div>
        </div>
      );
    }

    // Render aplikasi
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
