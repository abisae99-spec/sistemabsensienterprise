    // KONFIGURASI DATABASE
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxBoE9OK-bH_W8139VVTORk3-Ds4vK76odozzJZ6ZhdUq_L2UQQRKoATnFcpdPv6VWp/exec";
    const OFFICE_COORD = { lat: -6.1522193, lng: 106.789063 };
    const RADIUS_TOLERANCE_METERS = 100;
    const COLORS = { hadir: '#00F0FF', telat: '#FFB800', absen: '#FF003C', purple: '#B026FF', orange: '#FF5E00', lightPrimary: '#0070BA' };

    // --- HELPER FUNCTIONS ---
    const calculateDistance = (lat1, lon1, lat2, lon2) => {
      const R = 6371e3; const rad = Math.PI / 180;
      const a = Math.sin((lat2 - lat1) * rad / 2) ** 2 + Math.cos(lat1 * rad) * Math.cos(lat2 * rad) * Math.sin((lon2 - lon1) * rad / 2) ** 2;
      return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a)));
    };
    const formatTime = (date) => {
      const hh = String(date.getHours()).padStart(2, '0');
      const mm = String(date.getMinutes()).padStart(2, '0');
      const ss = String(date.getSeconds()).padStart(2, '0');
      return `${hh}:${mm}:${ss}`;
    };
    const formatDate = (date) => {
      const d = typeof date === 'string' ? new Date(date) : date;
      return `${String(d.getDate()).padStart(2, '0')}/${String(d.getMonth() + 1).padStart(2, '0')}/${d.getFullYear()}`;
    };
    const formatRupiah = (number) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', maximumFractionDigits: 0 }).format(number || 0);
    
    const formatIndoDate = (dateStr) => { 
        if (!dateStr || dateStr === '-') return '-'; let str = String(dateStr); 
        if (str.includes('/')) { const p = str.split('/'); return p[0].length === 4 ? `${p[2]}/${p[1]}/${p[0]}` : str; }
        if (str.includes('T')) str = str.split('T')[0]; if (str.includes(' ')) str = str.split(' ')[0];
        const p = str.split('-'); return p.length === 3 ? `${p[2].padStart(2,'0')}/${p[1].padStart(2,'0')}/${p[0]}` : str; 
    };
    const formatSheetTime = (val) => { if (!val) return ''; let strVal = String(val); if (strVal.includes('T')) { const timePart = strVal.split('T')[1]; if (timePart) return timePart.substring(0, 5); } return strVal; };

    const getAttendanceStatus = (time, type) => {
      const totalMins = time.getHours() * 60 + time.getMinutes();
      if (type === 'IN') {
        if (totalMins <= 8 * 60 + 10) return { status: 'Hadir', color: 'text-[#0070BA] dark:text-cyan-400' };
        if (totalMins <= 8 * 60 + 15) return { status: 'Telat', color: 'text-amber-500 dark:text-amber-400' };
        return { status: 'Sangat Telat', color: 'text-rose-600 dark:text-rose-500' };
      } else {
        if (totalMins < 17 * 60) return { status: 'Pulang Awal', color: 'text-amber-500 dark:text-amber-400' };
        if (totalMins <= 17 * 60 + 90) return { status: 'Normal', color: 'text-[#0070BA] dark:text-cyan-400' };
        return { status: 'Lembur', color: 'text-purple-600 dark:text-fuchsia-400' };
      }
    };

    const cleanTimeStr = (t) => {
      if (!t || t === '-' || String(t).trim() === '') return '-';
      
      if (typeof t === 'string' && t.includes('T') && t.includes('Z')) {
          const d = new Date(t);
          if (!isNaN(d.getTime())) {
              const hh = String(d.getHours()).padStart(2, '0');
              const mm = String(d.getMinutes()).padStart(2, '0');
              const ss = String(d.getSeconds()).padStart(2, '0');
              return `${hh}:${mm}:${ss}`;
          }
      }

      let str = String(t).trim();
      if (str.includes('T')) { const timePart = str.split('T')[1]; if(timePart) str = timePart; }
      str = str.replace(/\./g, ':');
      const parts = str.split(':');
      if (parts.length >= 2) { 
          const hh = parts[0].replace(/\D/g, '').slice(-2).padStart(2, '0'); 
          const mm = parts[1].replace(/\D/g, '').slice(0, 2).padStart(2, '0'); 
          const ss = parts.length >= 3 ? parts[2].replace(/\D/g, '').slice(0, 2).padStart(2, '0') : '00';
          return `${hh}:${mm}:${ss}`; 
      }
      return str;
    };

    const toHHMM = (m) => m <= 0 ? '-' : `${String(Math.floor(m/60)).padStart(2, '0')}:${String(m%60).padStart(2, '0')}`;

    const calculateTimes = (shift, checkIn, checkOut) => {
      const cin = cleanTimeStr(checkIn); const cout = cleanTimeStr(checkOut);
      if (!cin || cin === '-' || !cout || cout === '-') return { kerja: '-', telat: '-', awal: '-', lembur: '-', telatMins: 0, lemburMins: 0 };
      const [sIn, sOut] = (shift || '08:00 - 17:00').split('-').map(t => t.trim()); 
      const toMins = (t) => { const [h, m] = t.split(':').map(Number); return (h || 0) * 60 + (m || 0); };
      const sInM = toMins(sIn); const sOutM = toMins(sOut); const aInM = toMins(cin); const aOutM = toMins(cout);
      let kerjaM = aOutM - aInM; if (kerjaM < 0) kerjaM = 0; 
      let telatM = aInM > sInM ? aInM - sInM : 0; let awalM = aOutM < sOutM ? sOutM - aOutM : 0; let lemburM = aOutM > sOutM ? aOutM - sOutM : 0;
      return { kerja: toHHMM(kerjaM), telat: toHHMM(telatM), awal: toHHMM(awalM), lembur: toHHMM(lemburM), telatMins: telatM, lemburMins: lemburM };
    };

    const getDisplayKeterangan = (row, globalRequests) => {
        let ket = row.note || ''; 
        const relatedReq = globalRequests?.find(req => req.id === row.id && new Date(req.tglMulai) <= new Date(row.date) && new Date(req.tglSelesai) >= new Date(row.date));
        
        if(relatedReq) { 
            if (relatedReq.status === 'Approved') {
                ket = relatedReq.jenis.toLowerCase().includes('lembur') ? 'Lembur Disetujui' : `${relatedReq.jenis} Disetujui`;
            } else {
                ket = `${relatedReq.jenis} Belum Disetujui`;
            }
        } else if(row.status === 'HADIR' || row.status === 'TELAT') { 
            ket = ''; 
        } else if(row.status === 'ABSEN' && (!row.note || row.note === '-')) { 
            ket = 'Alfa / Tanpa Keterangan'; 
        } else if(row.foto || (row.note && row.note.toLowerCase().includes('selfie')) || (row.keterangan && row.keterangan.toLowerCase().includes('selfie'))) {
            ket = 'Dinas Luar';
        } else if(row.status === 'SAKIT') {
            ket = 'Sakit';
        }
        return ket;
    };

    const sendDataToSheet = async (data) => {
      try {
        const response = await fetch(GAS_URL, { method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body: JSON.stringify(data), redirect: 'follow' });

          return { status: 'success', user: { id: data.username.toUpperCase(), name: data.username.toUpperCase(), dept: 'Departemen Terkait', role: role } };

      const [globalEmployees, setGlobalEmployees] = useState([
        { id: 'EMP01', nama: 'Budi Karyawan', jk: 'Laki-laki', phone: '0812345678', tglGabung: '2022-01-10', tmpLahir: 'Jakarta', tglLahir: '1990-05-15', ktp: '317000000000001', alamat: 'Jl. Sudirman No 1', pendidikan: 'S1', role: 'user', dept: 'IT', jabatan: 'Staff', atasan: 'Manager IT', sisaCuti: 10, gapok: 6000000, tMakan: 50000, tJabatan: 0, tTransport: 300000, tThr: 6000000, tKes: 200000, tLain: 0, insentif: 0, pAsuransi: 100000, pBpjsKs: 60000, pBpjstk: 120000, pPinjam: 0, pAbsen: 0, pLain: 0 },
        { id: 'ADMIN', nama: 'Administrator Sistem', jk: 'Laki-laki', phone: '0800000000', tglGabung: '2019-01-01', tmpLahir: 'Jakarta', tglLahir: '1990-01-01', ktp: '317000000000000', alamat: 'Kantor Pusat', pendidikan: 'S1', role: 'admin', dept: 'IT', jabatan: 'Admin', atasan: '-', sisaCuti: 12, gapok: 10000000, tMakan: 100000, tJabatan: 1000000, tTransport: 500000, tThr: 10000000, tKes: 300000, tLain: 0, insentif: 0, pAsuransi: 0, pBpjsKs: 0, pBpjstk: 0, pPinjam: 0, pAbsen: 0, pLain: 0 }

      useEffect(() => {

                 const processedReqs = d.pengajuan.map(req => {

                    if (rawMulai.includes('/') && rawMulai.split('/')[0].length <= 2) rawMulai = rawMulai.split('/').reverse().join('-');
                    if (rawSelesai.includes('/') && rawSelesai.split('/')[0].length <= 2) rawSelesai = rawSelesai.split('/').reverse().join('-');
                    let d1 = new Date(rawMulai); let d2 = new Date(rawSelesai);
                    let m1 = !isNaN(d1.getTime()) ? d1.getFullYear()+'-'+String(d1.getMonth()+1).padStart(2,'0')+'-'+String(d1.getDate()).padStart(2,'0') : req.tglMulai;
                    let m2 = !isNaN(d2.getTime()) ? d2.getFullYear()+'-'+String(d2.getMonth()+1).padStart(2,'0')+'-'+String(d2.getDate()).padStart(2,'0') : req.tglSelesai;
                    return { ...req, tglMulai: m1, tglSelesai: m2 };
                 });
                 setGlobalRequests(processedReqs);
              }

              if (d.absen && d.absen.length > 0) {
                 const currUangMakan = (d.setting && d.setting.globalUangMakan) || globalUangMakan;
                 const processedAbsen = d.absen.map(a => {
                    let sClass = 'text-[#0070BA] bg-[#0070BA]/10 border-[#0070BA]/30'; 
                    if (a.status === 'TELAT' || a.status === 'PULANG AWAL') sClass = 'text-amber-600 bg-amber-100 border-amber-300';
                    if (a.status === 'ABSEN' || a.status === 'SANGAT TELAT') sClass = 'text-rose-600 bg-rose-100 border-rose-300';
                    if (a.status === 'LEMBUR' || a.status === 'CUTI') sClass = 'text-purple-600 bg-purple-100 border-purple-300';
                    
                    let rawDate = a.date || a.tanggal || '';
                    let validDateStr = ''; let displayStr = ''; let dayName = a.day || a.hari || '-';

                    if (rawDate) {
                        let dObj;
                        if (typeof rawDate === 'string') {
                            if (rawDate.includes('T') && rawDate.includes('Z')) { dObj = new Date(rawDate); } 
                            else if (rawDate.includes('/')) {
                                const parts = rawDate.split(' ')[0].split('/');
                                if (parts[0].length === 2 && parts[2]?.length === 4) dObj = new Date(`${parts[2]}-${parts[1]}-${parts[0]}T00:00:00`);
                                else dObj = new Date(rawDate);
                            } else dObj = new Date(rawDate);
                        } else dObj = new Date(rawDate);

                        if (!isNaN(dObj.getTime())) {
                            validDateStr = dObj.getFullYear() + '-' + String(dObj.getMonth() + 1).padStart(2, '0') + '-' + String(dObj.getDate()).padStart(2, '0');
                            displayStr = String(dObj.getDate()).padStart(2, '0') + '/' + String(dObj.getMonth() + 1).padStart(2, '0') + '/' + dObj.getFullYear();
                            const daysIndo = ['Minggu', 'Senin', 'Selasa', 'Rabu', 'Kamis', 'Jumat', 'Sabtu'];
                            dayName = daysIndo[dObj.getDay()];
                        } else { validDateStr = String(rawDate).split('T')[0]; displayStr = formatIndoDate(validDateStr); }
                    }

                    const rIn = cleanTimeStr(a.checkIn || a.in);
                    const rOut = cleanTimeStr(a.checkOut || a.out);
                    const shiftVal = a.shift || '08:00 - 17:00';
                    const times = calculateTimes(shiftVal, rIn, rOut);
                    
                    const emp = (d.karyawan || []).find(e => String(e.id).toUpperCase() === String(a.id).toUpperCase()) || {};
                    
                    let uangMakanHarian = emp.tMakan || 0; 
                    let uangMakanDiterima = uangMakanHarian;
                    const lowerStatus = (a.status || '').toLowerCase();
                    if (lowerStatus.includes('sakit') || lowerStatus.includes('izin') || lowerStatus.includes('cuti') || lowerStatus.includes('absen') || lowerStatus.includes('alfa')) { 
                        uangMakanDiterima = 0; 
                    } else if (times.telatMins > (currUangMakan.hangus || 15)) { 
                        uangMakanDiterima = 0; 
                    } else if (times.telatMins > (currUangMakan.toleransi || 10)) { 
                        uangMakanDiterima = Math.round(uangMakanHarian * (1 - (currUangMakan.potTelat || 50) / 100)); 
                    }

                    let uangLemburVal = 0; let lemburDis = '-';
                    const relatedReq = (d.pengajuan || []).find(req => req.id === a.id && new Date(req.tglMulai) <= new Date(validDateStr) && new Date(req.tglSelesai) >= new Date(validDateStr));
                    const isLemburApproved = relatedReq && relatedReq.jenis.toLowerCase() === 'lembur' && relatedReq.status === 'Approved';

                    if (isLemburApproved && times.lemburMins >= 90) {
                        let hourlyRate = Math.round((emp.gapok || 0) / 173);
                        let lemburHours = Math.floor(times.lemburMins / 60);
                        if (lemburHours === 1) uangLemburVal = hourlyRate * 1.5;
                        else if (lemburHours > 1) uangLemburVal = (hourlyRate * 1.5) + ((lemburHours - 1) * hourlyRate * 2);
                        lemburDis = times.lembur;

                    }

                    return { 
                       ...a, date: validDateStr, displayDate: displayStr, day: dayName,
                       time: `${rIn} - ${rOut}`, checkIn: rIn, checkOut: rOut, shift: shiftVal, shiftClass: 'text-[#0070BA]',

            }

        };

      }, []);

      const handleApprovalDecision = (reqIndex, decision) => {
          const updatedReqs = [...globalRequests]; updatedReqs[reqIndex].status = decision; setGlobalRequests(updatedReqs);
          const syncApproval = async () => { await sendDataToSheet({ action: 'UPDATE_PENGAJUAN', data: updatedReqs[reqIndex] }); await sendDataToSheet({ action: 'SYNC_ACC', data: updatedReqs.filter(r => r.status !== 'Pending') }); }

              let status = 'IZIN'; let statusClass = 'text-rose-600 bg-rose-100 border-rose-300'; let hours = 0; let time = '- - -';

                     if (lemburHours === 1) lemburVal = hourlyRate * 1.5;
                     else if (lemburHours > 1) lemburVal = (hourlyRate * 1.5) + ((lemburHours - 1) * hourlyRate * 2);

                 if(existingIdx > -1) newAttendance[existingIdx] = record; else newAttendance.push(record);
                 currentDate.setDate(currentDate.getDate() + 1);
              }
              newAttendance.sort((a,b) => new Date(a.date) - new Date(b.date)); setGlobalAttendance(newAttendance);
          }

    function AppLayout({ children, role, currentScreen, setCurrentScreen, isDarkMode, toggleTheme, onLogout, activeSettingTab, setActiveSettingTab, activeReportTab, setActiveReportTab, uiSettings }) {

          </aside>

    function AttendanceScreen({ user, onBack, onRecordAbsen }) {
      const [attendanceType, setAttendanceType] = useState('IN'); const [method, setMethod] = useState('barcode');
      const [locationName, setLocationName] = useState('Melacak posisi GPS...'); const [distance, setDistance] = useState(0);
      const [currentCoord, setCurrentCoord] = useState({ lat: 0, lng: 0 });
      const [isProcessing, setIsProcessing] = useState(false); const [result, setResult] = useState(null); const [capturedPhoto, setCapturedPhoto] = useState(null);
      const [outOfRadiusWarning, setOutOfRadiusWarning] = useState(false);
      const videoRef = useRef(null); const topRef = useRef(null); const [currentTime, setCurrentTime] = useState(new Date());

      useEffect(() => { const t = setInterval(() => setCurrentTime(new Date()), 1000); return () => clearInterval(t); }, []);
      useEffect(() => { if (topRef.current) topRef.current.scrollIntoView({ behavior: 'smooth' }); }, []);
      
      useEffect(() => { 
         if (!("geolocation" in navigator)) return;
         // ✅ DIPERBAIKI: watchPosition dengan 10 detik timeout dan enableHighAccuracy: true
         let watchId = navigator.geolocation.watchPosition(async (pos) => { 
            const lat = pos.coords.latitude; const lng = pos.coords.longitude; setCurrentCoord({ lat, lng }); 
            setDistance(calculateDistance(lat, lng, OFFICE_COORD.lat, OFFICE_COORD.lng)); 
            try {
               const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&zoom=18&addressdetails=1&accept-language=id`);
               const data = await res.json(); 
               let locStr = data.display_name;
               if (data.address) {
                 const building = data.address.building || data.address.amenity || data.address.office; const road = data.address.road; const city = data.address.city || data.address.town || data.address.county; let parts = []; if (building) parts.push(building); if (road) parts.push(road); if (city) parts.push(city);
                 if (parts.length > 0) locStr = parts.join(', ');
               } setLocationName(locStr);
            } catch(e) { setLocationName(`Lat: ${lat.toFixed(4)}, Lng: ${lng.toFixed(4)}`); }
         }, (err) => { setDistance(0); setLocationName('GPS tidak tersedia'); }, 
         { enableHighAccuracy: true, maximumAge: 0, timeout: 10000 }); // ✅ Timeout 10 detik
         return () => navigator.geolocation.clearWatch(watchId);
      }, []);

      useEffect(() => { if (distance > RADIUS_TOLERANCE_METERS && method === 'barcode') { setMethod('selfie'); setOutOfRadiusWarning(true); setTimeout(() => setOutOfRadiusWarning(false), 6000); } }, [distance, method]);

      useEffect(() => {
        let currentStream;
        const initCamera = async () => {
          // ✅ DIPERBAIKI: Camera hanya initialize jika method === 'selfie' atau 'barcode'
          if (!capturedPhoto && navigator.mediaDevices && (method === 'selfie' || method === 'barcode')) {
            try { 
              const constraints = { 
                video: { 
                  facingMode: method === 'selfie' ? 'user' : 'environment', 
                  width: { ideal: 1280 }, 
                  height: { ideal: 720 } 
                } 
              }; 
              currentStream = await navigator.mediaDevices.getUserMedia(constraints); 
              if (videoRef.current) videoRef.current.srcObject = currentStream; 
            } 
            catch (err) { 
              try { 
                currentStream = await navigator.mediaDevices.getUserMedia({ video: true }); 
                if (videoRef.current) videoRef.current.srcObject = currentStream; 
              } catch (e) { console.log('Kamera tidak tersedia'); }
            }
          }
        };
        initCamera(); 
        return () => { if (currentStream) currentStream.getTracks().forEach(t => t.stop()); };
      }, [method, capturedPhoto]);

      useEffect(() => {
        let checkTimer;
        // ✅ DIPERBAIKI: QR scanning dengan interval 200ms, BarcodeDetector primary + jsQR fallback
        if (method === 'barcode' && distance <= RADIUS_TOLERANCE_METERS && !result && !isProcessing) {
          checkTimer = setInterval(async () => {
            if (videoRef.current && videoRef.current.readyState === 4) {
              try {
                // Coba gunakan BarcodeDetector API (lebih presisi)
                if ('BarcodeDetector' in window) {
                  const detector = new window.BarcodeDetector(); 
                  const barcodes = await detector.detect(videoRef.current);
                  if (barcodes.length > 0) { clearInterval(checkTimer); handleAction(); return; }
                } 
                // Fallback ke jsQR jika BarcodeDetector tidak tersedia
                else if (window.jsQR) {
                  const canvas = document.createElement('canvas'); 
                  const context = canvas.getContext('2d'); 
                  canvas.width = videoRef.current.videoWidth; 
                  canvas.height = videoRef.current.videoHeight; 
                  context.drawImage(videoRef.current, 0, 0, canvas.width, canvas.height); 
                  const imageData = context.getImageData(0, 0, canvas.width, canvas.height);
                  const code = window.jsQR(imageData.data, imageData.width, imageData.height, { inversionAttempts: "attemptBoth" });
                  if (code) { clearInterval(checkTimer); handleAction(); return; }
                }
              } catch (e) { console.log('QR scan error:', e); }
            }
          }, 200); // ✅ Interval 200ms lebih optimal
        }
        return () => clearInterval(checkTimer);
      }, [method, distance, result, attendanceType, isProcessing]);

      const capturePhoto = () => { 
         if (videoRef.current) { 
            const c = document.createElement('canvas'); const MAX_WIDTH = 480; const scaleSize = MAX_WIDTH / videoRef.current.videoWidth; c.width = MAX_WIDTH; c.height = videoRef.current.videoHeight * scaleSize; 
            const ctx = c.getContext('2d'); 
            if (method === 'selfie') { ctx.translate(c.width, 0); ctx.scale(-1, 1); } ctx.drawImage(videoRef.current, 0, 0, c.width, c.height); 
            if (method === 'selfie') {
               ctx.setTransform(1, 0, 0, 1, 0, 0); const rectHeight = 60; ctx.fillStyle = 'rgba(0, 0, 0, 0.6)'; ctx.fillRect(0, c.height - rectHeight, c.width, rectHeight); ctx.fillStyle = 'white'; ctx.textAlign = 'center'; ctx.font = 'bold 16px sans-serif'; const dayName = currentTime.toLocaleDateString('id-ID', {weekday: 'long'});
               ctx.fillText(`${dayName}, ${formatDate(currentTime)} ${formatTime(currentTime)}`, c.width / 2, c.height - 32); ctx.font = '12px sans-serif'; ctx.fillText(locationName.substring(0, 60) + (locationName.length > 60 ? '...' : ''), c.width / 2, c.height - 12);
            }

         } 
      };
      
      const handleAction = async () => {

         if (onRecordAbsen) onRecordAbsen(newAbsenPayload);
         setResult({ success: true, time: formatTime(now), status: statusObj.status, locName: locName, color: statusObj.color.split(' ')[0] }); setIsProcessing(false); 
      };

      if (result) return (
        <div ref={topRef} className="h-full flex items-center justify-center animate-fade-in-up">

            <div className="w-20 h-20 bg-[#0070BA]/10 dark:bg-[#00F0FF]/20 rounded-full flex items-center justify-center mx-auto mb-6 shadow-[0_0_20px_rgba(0,112,186,0.3)]"><CheckCircle className="text-[#0070BA] dark:text-[#00F0FF]" size={40} /></div>
            <h2 className="text-2xl font-black text-[#134E4A] dark:text-white mb-2 uppercase tracking-widest">BERHASIL TEREKAM</h2><p className="text-[#0070BA] dark:text-[#00F0FF] text-[10px] font-bold tracking-[0.2em] mb-8">LAPORAN KEHADIRAN</p>
            <div className="space-y-4 text-left bg-white/40 dark:bg-black/20 p-5 rounded-2xl mb-8">

               <div className="flex justify-between items-center border-b border-black/5 pb-2"><span className="text-[10px] font-bold text-gray-500 uppercase">Status</span><span className={`text-sm font-black uppercase ${result.color}`}>{result.status}</span></div>
               <div className="flex justify-between gap-4 pb-2"><span className="text-[10px] font-bold text-gray-500 uppercase shrink-0">Lokasi Tercatat</span><span className="text-[10px] font-bold text-[#134E4A] dark:text-white text-right line-clamp-2">{result.locName}</span></div>
            </div>
            <Button variant="outline" className="w-full" onClick={onBack}>KEMBALI KE DASHBOARD</Button>
          </GlassCard>
        </div>
      );

      return (
        <div ref={topRef} className="max-w-2xl mx-auto space-y-4 animate-fade-in-up pt-2 pb-10">
          {outOfRadiusWarning && (
             <div className="bg-rose-100 dark:bg-[#FF003C]/20 border border-rose-500 text-rose-600 dark:text-[#FF003C] p-4 rounded-2xl text-[10px] md:text-xs font-bold flex items-center gap-3 shadow-md animate-pulse"><AlertTriangle size={20} className="shrink-0" /><p>Anda berada di luar radius kantor (&gt;100m). Mode dialihkan otomatis ke Dinas Luar (Selfie).</p></div>

          <div className="flex p-1.5 bg-white/50 dark:bg-[#0A1128] border border-[#0070BA]/20 dark:border-[#00F0FF]/20 rounded-[1.5rem] shadow-inner relative overflow-hidden h-[60px]">
            <div className={`absolute top-1.5 bottom-1.5 w-[calc(50%-6px)] bg-gradient-to-r ${attendanceType==='IN'?'from-[#0070BA] to-[#004080] dark:from-[#00F0FF] dark:to-[#0057FF] left-1.5':'from-[#8E24AA] to-[#D81B60] dark:from-[#B026FF] dark:to-[#FF003C] left-[calc(50%+4.5px)]'} rounded-[1.2rem] transition-all duration-500 z-0`}></div>

          </div>

          <GlassCard className="h-[450px] md:h-[500px] flex flex-col items-center justify-center relative overflow-hidden bg-[#111827]">
            {capturedPhoto ? <img src={capturedPhoto} alt="Captured" className="w-full h-full object-cover" /> : <video ref={videoRef} autoPlay playsInline className={`w-full h-full object-cover ${method === 'selfie' ? '[transform:scaleX(-1)]' : ''}`} />}
            
            {method === 'barcode' && !capturedPhoto && (
              <div className="absolute inset-0 z-10 flex flex-col items-center justify-center pointer-events-none">
                 <div className="w-[80%] h-[60%] max-w-[350px] max-h-[350px] rounded-3xl border-4 border-[#00F0FF] shadow-[0_0_0_9999px_rgba(0,0,0,0.6)] relative overflow-hidden"><div className="absolute top-0 left-0 w-full h-1 bg-[#00F0FF] shadow-[0_0_15px_3px_#00F0FF] animate-[scan_2s_ease-in-out_infinite]"></div></div>
                 <p className="absolute bottom-8 text-white font-bold text-[10px] uppercase tracking-widest drop-shadow-md bg-black/40 px-4 py-1.5 rounded-full">Arahkan QR Code ke dalam kotak</p>

          {!capturedPhoto ? (
              method === 'selfie' ? (<Button className="w-full h-14" onClick={capturePhoto}><Camera size={18} /> AMBIL FOTO</Button>) : (
                  <div className="w-full h-14 flex items-center justify-center bg-black/5 dark:bg-white/5 rounded-2xl border border-black/10 dark:border-white/10"><span className="text-xs font-bold text-[#0070BA] dark:text-[#00F0FF] animate-pulse uppercase tracking-widest flex items-center gap-2"><ScanLine size={18} /> Memindai Barcode...</span></div>
              )
          ) : (
              <div className="flex gap-3 w-full"><Button variant="outline" className="flex-1 h-14" onClick={()=>setCapturedPhoto(null)}>ULANGI</Button><Button variant={attendanceType==='IN'?'primary':'secondary'} className="flex-[2] h-14" onClick={handleAction} disabled={isProcessing}>REKAM</Button></div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
